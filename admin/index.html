<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H5点餐系统 - 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            min-height: 100vh;
            background: #f5f7fa;
        }

        /* 左侧导航 */
        .sidebar {
            width: 220px;
            background: #304156;
            color: #fff;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100%;
            overflow-y: auto;
        }

        .logo {
            padding: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav-items {
            flex: 1;
            padding: 10px 0;
        }

        .nav-item {
            padding: 15px 25px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .nav-item.active {
            background: #409EFF;
        }

        .nav-item span {
            font-size: 14px;
        }

        /* 右侧内容区 */
        .main-content {
            margin-left: 220px;
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .header-title {
            font-size: 24px;
            color: #303133;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-name {
            font-size: 14px;
            color: #606266;
        }

        .user-role {
            font-size: 12px;
            padding: 4px 8px;
            background: #e0e0e0;
            border-radius: 4px;
            color: #606266;
        }

        .btn-logout {
            padding: 8px 16px;
            background: #f56c6c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }

        .btn-logout:hover {
            background: #f78989;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .page-title {
            font-size: 24px;
            margin-bottom: 20px;
            color: #303133;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }

        .stat-title {
            font-size: 14px;
            color: #909399;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: bold;
            color: #303133;
        }

        /* 按钮样式 */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #409EFF;
            color: white;
        }

        .btn-primary:hover {
            background: #66b1ff;
        }

        .btn-success {
            background: #67c23a;
            color: white;
        }

        .btn-success:hover {
            background: #85ce61;
        }

        .btn-danger {
            background: #f56c6c;
            color: white;
        }

        .btn-danger:hover {
            background: #f78989;
        }

        .btn-warning {
            background: #e6a23c;
            color: white;
        }

        .btn-warning:hover {
            background: #ebb563;
        }

        /* 表格样式 */
        .table-container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: #f5f7fa;
            font-weight: 500;
            color: #606266;
        }

        .status-new {
            color: #e6a23c;
            font-weight: 500;
        }

        .status-done {
            color: #67c23a;
            font-weight: 500;
        }

        /* 标签页 */
        .tabs {
            display: flex;
            border-bottom: 2px solid #e0e0e0;
            margin-bottom: 20px;
        }

        .tab {
            padding: 12px 24px;
            cursor: pointer;
            color: #606266;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .tab:hover {
            color: #409EFF;
        }

        .tab.active {
            color: #409EFF;
            border-bottom-color: #409EFF;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            max-width: 500px;
            width: 90%;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: bold;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }

        .close-btn:hover {
            color: #333;
        }

        .form-input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #606266;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* 加载提示 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #909399;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #909399;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
            }

            .logo {
                font-size: 14px;
            }

            .nav-item span {
                display: none;
            }

            .nav-item {
                justify-content: center;
            }

            .main-content {
                margin-left: 60px;
                padding: 15px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">🍽️ 餐饮管理</div>
        <div class="nav-items">
            <div class="nav-item active" data-page="orders">
                <span>📋 订单管理</span>
            </div>
            <div class="nav-item" data-page="dishes">
                <span>🍜 菜品管理</span>
            </div>
            <div class="nav-item" data-page="stats">
                <span>📊 数据统计</span>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1 class="header-title">管理后台</h1>
            <div class="user-info">
                <span class="user-name" id="userName">管理员</span>
                <span class="user-role" id="userRole">管理员</span>
                <button class="btn-logout" id="logoutBtn">退出登录</button>
            </div>
        </div>

        <!-- 订单管理页面 -->
        <div class="page active" id="page-orders">
            <h2 class="page-title">订单管理</h2>

            <div class="tabs">
                <div class="tab active" data-status="">全部订单</div>
                <div class="tab" data-status="new">新订单</div>
                <div class="tab" data-status="done">已完成</div>
            </div>

            <div class="table-container">
                <div id="ordersList">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>

        <!-- 菜品管理页面 -->
        <div class="page" id="page-dishes">
            <h2 class="page-title">菜品管理</h2>

            <div style="margin-bottom: 20px;">
                <button class="btn btn-primary" id="addDishBtn">+ 添加菜品</button>
            </div>

            <div class="table-container">
                <div id="dishesList">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>

        <!-- 数据统计页面 -->
        <div class="page" id="page-stats">
            <h2 class="page-title">数据统计</h2>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-title">今日订单数</div>
                    <div class="stat-value" id="statOrders">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">今日营收</div>
                    <div class="stat-value" id="statRevenue">¥0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">待处理订单</div>
                    <div class="stat-value" id="statNewOrders">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">总营收</div>
                    <div class="stat-value" id="statTotalRevenue">¥0</div>
                </div>
            </div>
        </div>
    </div>

    <!-- 添加/编辑菜品模态框 -->
    <div class="modal" id="dishModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="dishModalTitle">添加菜品</h3>
                <button class="close-btn" id="closeDishModal">×</button>
            </div>
            <form id="dishForm">
                <input type="hidden" id="dishId">
                <label class="form-label">菜品名称</label>
                <input type="text" class="form-input" id="dishName" required>
                <label class="form-label">价格</label>
                <input type="number" step="0.01" class="form-input" id="dishPrice" required>
                <label class="form-label">描述</label>
                <input type="text" class="form-input" id="dishDescription">
                <label class="form-label">图片URL</label>
                <input type="text" class="form-input" id="dishImage" placeholder="/images/dish1.jpg">
                <label class="form-label">分类</label>
                <select class="form-input" id="dishCategory">
                    <option value="0">到店</option>
                    <option value="1">外卖</option>
                    <option value="2">预制菜</option>
                </select>
                <label class="form-label">状态</label>
                <select class="form-input" id="dishStatus">
                    <option value="1">上架</option>
                    <option value="0">下架</option>
                </select>
                <div class="modal-actions">
                    <button type="button" class="btn" id="cancelDishBtn">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 全局变量
        let token = localStorage.getItem('adminToken');
        let currentUser = JSON.parse(localStorage.getItem('adminUser') || '{}');
        let currentStatus = '';
        let refreshInterval = null;

        // 登录检查
        function checkAuth() {
            if (!token) {
                window.location.href = '/admin/login.html';
                return false;
            }
            return true;
        }

        // 页面加载时检查登录
        if (!checkAuth()) {
            throw new Error('未登录');
        }

        // 更新用户信息显示
        document.getElementById('userName').textContent = currentUser.nickname || currentUser.username;
        document.getElementById('userRole').textContent = getRoleText(currentUser.role);

        function getRoleText(role) {
            const roleMap = {
                'admin': '管理员',
                'super_admin': '超级管理员'
            };
            return roleMap[role] || role;
        }

        // 登出
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            if (confirm('确定要退出登录吗？')) {
                try {
                    await fetch('/api/auth/logout', {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer ' + token
                        }
                    });
                } catch (error) {
                    console.error('登出请求失败:', error);
                }

                localStorage.removeItem('adminToken');
                localStorage.removeItem('adminUser');
                window.location.href = '/admin/login.html';
            }
        });

        // 切换导航页面
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');

                const page = this.dataset.page;
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById('page-' + page).classList.add('active');

                // 加载对应页面数据
                if (page === 'orders') loadOrders();
                if (page === 'dishes') loadDishes();
                if (page === 'stats') loadStats();
            });
        });

        // API请求工具函数
        async function apiRequest(url, options = {}) {
            const headers = {
                'Authorization': 'Bearer ' + token,
                ...options.headers
            };

            const response = await fetch(url, {
                ...options,
                headers
            });

            // 如果token无效，跳转到登录页
            if (response.status === 401 || response.status === 403) {
                localStorage.removeItem('adminToken');
                localStorage.removeItem('adminUser');
                window.location.href = '/admin/login.html';
                throw new Error('认证失败');
            }

            return response.json();
        }

        // 加载订单列表
        async function loadOrders() {
            try {
                const url = currentStatus ?
                    `/api/orders?status=${currentStatus}` :
                    '/api/orders';
                const data = await apiRequest(url);

                if (data.success) {
                    renderOrders(data.data);
                }
            } catch (error) {
                console.error('加载订单失败:', error);
                document.getElementById('ordersList').innerHTML =
                    '<div class="empty">加载失败</div>';
            }
        }

        function renderOrders(orders) {
            const container = document.getElementById('ordersList');

            if (!orders || orders.length === 0) {
                container.innerHTML = '<div class="empty">暂无订单</div>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>订单号</th>
                            <th>桌号</th>
                            <th>菜品</th>
                            <th>总价</th>
                            <th>状态</th>
                            <th>下单时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            orders.forEach(order => {
                const items = JSON.parse(order.items || '[]');
                const itemNames = items.map(i => `${i.name} x${i.quantity}`).join(', ');
                const statusText = order.status === 'new' ? '新订单' : '已完成';
                const statusClass = order.status === 'new' ? 'status-new' : 'status-done';
                const time = new Date(order.created_at).toLocaleString('zh-CN');

                html += `
                    <tr>
                        <td>#${order.id}</td>
                        <td>${order.table_id}</td>
                        <td>${itemNames}</td>
                        <td>¥${parseFloat(order.total_price).toFixed(2)}</td>
                        <td class="${statusClass}">${statusText}</td>
                        <td>${time}</td>
                        <td>
                            ${order.status === 'new' ? `<button class="btn btn-success" onclick="completeOrder(${order.id})">完成</button>` : '-'}
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // 完成订单
        window.completeOrder = async function(orderId) {
            if (!confirm('确定完成此订单？')) return;

            try {
                const data = await apiRequest(`/api/orders/${orderId}/complete`, {
                    method: 'PUT'
                });

                if (data.success) {
                    loadOrders();
                } else {
                    alert('操作失败: ' + data.message);
                }
            } catch (error) {
                console.error('完成订单失败:', error);
                alert('操作失败');
            }
        };

        // 订单状态标签切换
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
                currentStatus = this.dataset.status;
                loadOrders();
            });
        });

        // 加载菜品列表
        async function loadDishes() {
            try {
                const data = await apiRequest('/api/dishes');

                if (data.success) {
                    renderDishes(data.data);
                }
            } catch (error) {
                console.error('加载菜品失败:', error);
                document.getElementById('dishesList').innerHTML =
                    '<div class="empty">加载失败</div>';
            }
        }

        function renderDishes(dishes) {
            const container = document.getElementById('dishesList');

            if (!dishes || dishes.length === 0) {
                container.innerHTML = '<div class="empty">暂无菜品</div>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>图片</th>
                            <th>名称</th>
                            <th>价格</th>
                            <th>分类</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            const categoryMap = { 0: '到店', 1: '外卖', 2: '预制菜' };

            dishes.forEach(dish => {
                const categoryText = categoryMap[dish.category] || '-';
                const statusText = dish.status === 1 ? '上架' : '下架';
                const statusClass = dish.status === 1 ? 'status-done' : 'status-new';

                html += `
                    <tr>
                        <td>${dish.id}</td>
                        <td><img src="${dish.image_url}" alt="${dish.name}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 4px;"></td>
                        <td>${dish.name}</td>
                        <td>¥${parseFloat(dish.price).toFixed(2)}</td>
                        <td>${categoryText}</td>
                        <td class="${statusClass}">${statusText}</td>
                        <td>
                            <button class="btn btn-primary" onclick="editDish(${dish.id})">编辑</button>
                            <button class="btn btn-danger" onclick="deleteDish(${dish.id})">删除</button>
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // 添加菜品
        document.getElementById('addDishBtn').addEventListener('click', () => {
            document.getElementById('dishModalTitle').textContent = '添加菜品';
            document.getElementById('dishForm').reset();
            document.getElementById('dishId').value = '';
            document.getElementById('dishModal').classList.add('active');
        });

        // 编辑菜品
        window.editDish = async function(dishId) {
            try {
                const data = await apiRequest(`/api/dishes/${dishId}`);

                if (data.success) {
                    const dish = data.data;
                    document.getElementById('dishModalTitle').textContent = '编辑菜品';
                    document.getElementById('dishId').value = dish.id;
                    document.getElementById('dishName').value = dish.name;
                    document.getElementById('dishPrice').value = dish.price;
                    document.getElementById('dishDescription').value = dish.description || '';
                    document.getElementById('dishImage').value = dish.image_url || '';
                    document.getElementById('dishCategory').value = dish.category;
                    document.getElementById('dishStatus').value = dish.status;
                    document.getElementById('dishModal').classList.add('active');
                }
            } catch (error) {
                console.error('加载菜品详情失败:', error);
            }
        };

        // 删除菜品
        window.deleteDish = async function(dishId) {
            if (!confirm('确定删除此菜品？')) return;

            try {
                const data = await apiRequest(`/api/dishes/${dishId}`, {
                    method: 'DELETE'
                });

                if (data.success) {
                    loadDishes();
                } else {
                    alert('删除失败: ' + data.message);
                }
            } catch (error) {
                console.error('删除菜品失败:', error);
                alert('删除失败');
            }
        };

        // 提交菜品表单
        document.getElementById('dishForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const dishId = document.getElementById('dishId').value;
            const dishData = {
                name: document.getElementById('dishName').value,
                price: parseFloat(document.getElementById('dishPrice').value),
                description: document.getElementById('dishDescription').value,
                image_url: document.getElementById('dishImage').value,
                category: parseInt(document.getElementById('dishCategory').value),
                status: parseInt(document.getElementById('dishStatus').value)
            };

            try {
                let url = '/api/dishes';
                let method = 'POST';

                if (dishId) {
                    url = `/api/dishes/${dishId}`;
                    method = 'PUT';
                }

                const data = await apiRequest(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(dishData)
                });

                if (data.success) {
                    document.getElementById('dishModal').classList.remove('active');
                    loadDishes();
                } else {
                    alert('保存失败: ' + data.message);
                }
            } catch (error) {
                console.error('保存菜品失败:', error);
                alert('保存失败');
            }
        });

        // 关闭菜品模态框
        document.getElementById('closeDishModal').addEventListener('click', () => {
            document.getElementById('dishModal').classList.remove('active');
        });

        document.getElementById('cancelDishBtn').addEventListener('click', () => {
            document.getElementById('dishModal').classList.remove('active');
        });

        // 加载统计数据
        async function loadStats() {
            try {
                const data = await apiRequest('/api/orders/stats/today');

                if (data.success) {
                    const stats = data.data;
                    document.getElementById('statOrders').textContent = stats.total_orders || 0;
                    document.getElementById('statRevenue').textContent = '¥' +
                        (parseFloat(stats.total_revenue || 0)).toFixed(2);
                    document.getElementById('statNewOrders').textContent = stats.new_orders || 0;
                    document.getElementById('statTotalRevenue').textContent = '¥' +
                        (parseFloat(stats.total_revenue || 0)).toFixed(2);
                }
            } catch (error) {
                console.error('加载统计失败:', error);
            }
        }

        // 初始化加载
        loadOrders();

        // 定期刷新订单（30秒）
        refreshInterval = setInterval(() => {
            const activePage = document.querySelector('.page.active');
            if (activePage && activePage.id === 'page-orders') {
                loadOrders();
            }
            loadStats();
        }, 30000);

        // 页面卸载时清除定时器
        window.addEventListener('beforeunload', () => {
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
        });
    </script>
</body>
</html>
