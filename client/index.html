<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>H5点餐系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .welcome {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .table-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .table-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .table-number {
            color: #667eea;
            font-size: 36px;
            font-weight: bold;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 20px;
            color: #999;
            font-size: 12px;
        }

        .loading {
            display: none;
            margin-top: 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ 扫码点餐</h1>
        <p class="welcome">欢迎使用H5点餐系统</p>

        <div class="table-info">
            <div class="table-label">您的桌号</div>
            <div class="table-number" id="tableNumber">--</div>
        </div>

        <a href="#" class="btn" id="startBtn" onclick="startOrder()">开始点餐</a>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #666;">正在准备菜单...</p>
        </div>

        <div class="footer">
            MVP版本 v1.0
        </div>
    </div>

    <script>
        // 从URL参数获取桌号
        const urlParams = new URLSearchParams(window.location.search);
        const tableId = urlParams.get('table') || 'A01';

        // 显示桌号
        document.getElementById('tableNumber').textContent = tableId;

        // 开始点餐
        function startOrder() {
            const loading = document.getElementById('loading');
            const btn = document.getElementById('startBtn');

            loading.style.display = 'block';
            btn.style.display = 'none';

            // 延迟跳转到菜单页
            setTimeout(() => {
                window.location.href = `menu.html?table=${tableId}`;
            }, 1000);
        }

        // 自动开始（可选，如果不想自动开始可以注释掉）
        // setTimeout(startOrder, 1500);
    </script>
</body>
</html>
